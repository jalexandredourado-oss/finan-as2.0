<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAMUEL - FINANÇAS LOCAIS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background: #000; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .uppercase-input { text-transform: uppercase; }
  </style>
</head>
<body class="bg-black text-slate-100 h-screen overflow-hidden">

  <div id="splash-screen" class="fixed inset-0 bg-slate-950 z-[300] flex flex-col items-center justify-center transition-all duration-700">
    <div class="bg-blue-600 p-5 rounded-3xl animate-pulse"><i data-lucide="wallet" class="text-white w-12 h-12"></i></div>
    <h1 class="font-black text-4xl mt-6 uppercase tracking-widest">SAMUEL</h1>
  </div>

  <div id="app-screen" class="h-full flex flex-col">
    <header class="bg-slate-900 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="wallet" class="text-white w-5 h-5"></i></div>
        <div class="flex flex-col">
          <span class="font-black text-sm uppercase">SAMUEL</span>
          <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">GESTÃO FINANCEIRA</span>
        </div>
      </div>
    </header>

    <nav class="p-4 shrink-0">
      <div class="flex gap-1 p-1 bg-slate-900 rounded-2xl border border-slate-800 overflow-x-auto scrollbar-hide">
        <button data-tab="expense" class="nav-tab-btn flex-1 py-3 rounded-xl flex flex-col items-center gap-1 bg-slate-800"><i data-lucide="trending-down" class="w-4 h-4 text-rose-500"></i><span class="text-[9px] font-black uppercase">DESPESA</span></button>
        <button data-tab="income" class="nav-tab-btn flex-1 py-3 rounded-xl flex flex-col items-center gap-1 opacity-40"><i data-lucide="trending-up" class="w-4 h-4 text-emerald-500"></i><span class="text-[9px] font-black uppercase">RECEITA</span></button>
        <button data-tab="history" class="nav-tab-btn flex-1 py-3 rounded-xl flex flex-col items-center gap-1 opacity-40"><i data-lucide="history" class="w-4 h-4 text-blue-500"></i><span class="text-[9px] font-black uppercase">HISTÓRICO</span></button>
        <button data-tab="report" class="nav-tab-btn flex-1 py-3 rounded-xl flex flex-col items-center gap-1 opacity-40"><i data-lucide="bar-chart-3" class="w-4 h-4 text-purple-500"></i><span class="text-[9px] font-black uppercase">RELATÓRIO</span></button>
        <button data-tab="settings" class="nav-tab-btn flex-1 py-3 rounded-xl flex flex-col items-center gap-1 opacity-40"><i data-lucide="settings" class="w-4 h-4 text-slate-400"></i><span class="text-[9px] font-black uppercase">AJUSTES</span></button>
      </div>
    </nav>

    <main class="flex-1 overflow-y-auto px-4 pb-10">
      <section id="tab-expense" class="tab-content space-y-4">
        <form id="transaction-form" class="space-y-4">
           <div class="bg-slate-900 py-3.5 px-5 rounded-3xl border border-slate-800">
             <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-0.5">QUANTO GASTOU?</p>
             <input type="text" id="transaction-amount" inputmode="decimal" placeholder="R$ 0,00" class="bg-transparent w-full text-3xl font-black text-white outline-none placeholder:text-slate-800 uppercase-input" required />
           </div>
           <input type="text" id="transaction-desc" placeholder="DESCRIÇÃO" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-sm font-bold uppercase uppercase-input" required />
           <div class="grid grid-cols-2 gap-3">
              <select id="transaction-category" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none font-bold text-xs uppercase uppercase-input"></select>
              <input type="date" id="transaction-date" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none font-bold text-xs uppercase uppercase-input" required />
           </div>
           <div class="grid grid-cols-2 gap-3">
              <select id="transaction-method" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none font-bold text-xs uppercase uppercase-input"></select>
              <select id="transaction-card" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none font-bold text-xs uppercase uppercase-input"></select>
           </div>
           <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex items-center justify-between">
             <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">COMPRA EM PRESTAÇÕES?</span>
             <div class="flex gap-2">
               <button type="button" id="btn-installment-no" class="px-6 py-2 bg-slate-800 text-white rounded-xl text-xs font-bold uppercase">NÃO</button>
               <button type="button" id="btn-installment-yes" class="px-6 py-2 bg-slate-800 text-slate-500 rounded-xl text-xs font-bold uppercase">SIM</button>
               <input type="number" id="transaction-installments" min="2" max="120" value="2" class="hidden w-16 p-2 bg-slate-800 text-center rounded-xl font-bold text-xs uppercase" />
             </div>
           </div>
           <button type="submit" class="w-full py-4 rounded-2xl font-black uppercase text-xs tracking-widest bg-rose-600 shadow-lg">GUARDAR LANÇAMENTO</button>
        </form>
      </section>

      <section id="tab-income" class="tab-content hidden space-y-4">
        <!-- Lógica de Receita Similar -->
      </section>

      <section id="tab-history" class="tab-content hidden space-y-4">
         <div id="history-list" class="space-y-3"></div>
      </section>

      <section id="tab-report" class="tab-content hidden space-y-4">
         <div id="report-content" class="space-y-4"></div>
      </section>
    </main>
  </div>

  <div id="edit-modal" class="hidden fixed inset-0 z-[250] bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
    <div id="edit-modal-content" class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-6 border border-slate-800 shadow-2xl">
      <h2 class="font-black text-xs uppercase tracking-widest mb-6">EDITAR LANÇAMENTO</h2>
      <div id="edit-modal-form" class="space-y-4"></div>
    </div>
  </div>

  <div id="settings-modal" class="hidden fixed inset-0 z-[250] bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
    <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-6 border border-slate-800 shadow-2xl">
      <h2 class="font-black text-xs uppercase tracking-widest mb-6">AJUSTES E CATEGORIAS</h2>
      <div id="settings-modal-content" class="space-y-4">
         <input type="text" id="new-cat-name" placeholder="NOME DA CATEGORIA" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold uppercase uppercase-input" />
         <select id="new-cat-type" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold uppercase uppercase-input">
            <option value="DESPESA">DESPESA</option>
            <option value="RECEITA">RECEITA</option>
         </select>
         <button onclick="addCategory()" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-xs">ADICIONAR</button>
         <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="w-full py-4 bg-slate-800 rounded-2xl font-black uppercase text-xs text-slate-400">FECHAR</button>
      </div>
    </div>
  </div>

  <script>
    // --- APP CORE ---
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    let categories = JSON.parse(localStorage.getItem('categories')) || [{name: 'ALIMENTAÇÃO', type: 'DESPESA'}, {name: 'PORTO SEGURO', type: 'DESPESA'}];
    let cards = JSON.parse(localStorage.getItem('cards')) || ['CARTÃO DE CRÉDITO', 'PIX', 'DÉBITO', 'DINHEIRO'];

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => document.getElementById('splash-screen').classList.add('opacity-0', 'pointer-events-none'), 1000);
      init();
    });

    function init() {
      // Setup Selects
      updateSelects();
      document.getElementById('transaction-card').value = 'CARTÃO DE CRÉDITO';
      
      // Tabs
      document.querySelectorAll('.nav-tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (btn.dataset.tab === 'settings') return document.getElementById('settings-modal').classList.remove('hidden');
          document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
          document.querySelectorAll('.nav-tab-btn').forEach(b => b.classList.add('opacity-40', 'bg-transparent'));
          document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
          btn.classList.remove('opacity-40', 'bg-transparent');
          btn.classList.add('bg-slate-800');
        });
      });

      // Installment Logic
      document.getElementById('btn-installment-yes').addEventListener('click', () => {
        document.getElementById('transaction-installments').classList.remove('hidden');
        document.getElementById('transaction-installments').focus();
        document.getElementById('btn-installment-yes').classList.add('bg-slate-700');
        document.getElementById('btn-installment-no').classList.remove('bg-slate-700');
      });
      document.getElementById('btn-installment-no').addEventListener('click', () => {
        document.getElementById('transaction-installments').classList.add('hidden');
        document.getElementById('btn-installment-no').classList.add('bg-slate-700');
        document.getElementById('btn-installment-yes').classList.remove('bg-slate-700');
      });
    }

    function updateSelects() {
        const catSelect = document.getElementById('transaction-category');
        catSelect.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        const cardSelect = document.getElementById('transaction-card');
        cardSelect.innerHTML = cards.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function renderEditModal(index) {
        const t = transactions[index];
        const modal = document.getElementById('edit-modal');
        const form = document.getElementById('edit-modal-form');
        
        form.innerHTML = `
            <input type="text" id="edit-desc" value="${t.desc}" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold uppercase uppercase-input text-white" />
            <input type="number" id="edit-amount" value="${t.amount}" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold uppercase uppercase-input text-white" />
            <select id="edit-method" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold uppercase uppercase-input text-white">
                ${cards.map(c => `<option value="${c}" ${t.card === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
            <button onclick="saveEdit(${index})" class="w-full py-4 bg-emerald-600 rounded-2xl font-black uppercase text-xs">SALVAR</button>
            <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="w-full py-4 bg-slate-800 rounded-2xl font-black uppercase text-xs text-slate-400">CANCELAR</button>
        `;
        modal.classList.remove('hidden');
    }

    function saveEdit(index) {
        // Logic to update array
        transactions[index].desc = document.getElementById('edit-desc').value.toUpperCase();
        transactions[index].amount = document.getElementById('edit-amount').value;
        localStorage.setItem('transactions', JSON.stringify(transactions));
        document.getElementById('edit-modal').classList.add('hidden');
        renderHistory();
    }

    function addCategory() {
        const name = document.getElementById('new-cat-name').value.toUpperCase();
        const type = document.getElementById('new-cat-type').value;
        if(name) {
            categories.push({name, type});
            localStorage.setItem('categories', JSON.stringify(categories));
            updateSelects();
            document.getElementById('settings-modal').classList.add('hidden');
        }
    }
  </script>
</body>
</html>
